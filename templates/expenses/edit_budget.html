{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>Edit Budget Allocation</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Amount
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    value="{{ budget.total_budget }}"
                    class="form-control"
                    required
                >

            </div>

            <button type="submit" class="btn btn-success">
                Save Changes
            </button>

            <a href="{% url 'budget_planner' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
