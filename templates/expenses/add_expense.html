{% extends "base.html" %}

{% block content %}

<div class="container mt-5 d-flex justify-content-center">

    <div class="card border-0 shadow-lg rounded-4 p-4 w-100" style="max-width: 520px;">

        <!-- Header -->
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success">➕ Add Expense</h2>
            <p class="text-muted">Track your daily spending easily</p>
        </div>

        <!-- Form -->
        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <!-- Note field (same logic, only UI improved) -->
            <div class="mb-3" id="noteContainer" style="display:none;">

                <label class="form-label fw-semibold text-dark">
                    📝 Note (Required for Other)
                </label>

                <input
                    type="text"
                    name="note"
                    id="noteField"
                    class="form-control rounded-3 shadow-sm"
                    placeholder="Enter expense details">

            </div>

            <!-- Button -->
            <button class="btn btn-success w-100 rounded-3 shadow-sm py-2">
                Save Expense
            </button>

        </form>

    </div>

</div>

<!-- Your JS (UNCHANGED LOGIC) -->
<script>

document.addEventListener("DOMContentLoaded", function() {

    const categorySelect =
        document.querySelector('select[name="category"]');

    const noteDiv =
        document.getElementById("noteContainer");

    if (!categorySelect || !noteDiv) return;

    noteDiv.style.display = "none";

    categorySelect.addEventListener("change", function() {

        if (this.value === "Other") {

            noteDiv.style.display = "block";
            document.getElementById("noteField").required = true;

        } else {

            noteDiv.style.display = "none";
            document.getElementById("noteField").required = false;
            document.getElementById("noteField").value = "";

        }

    });

});

</script>

{% endblock %}
