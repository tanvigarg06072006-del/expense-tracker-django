{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card border-0 shadow-lg rounded-4 p-4" style="width: 100%; max-width: 420px;">

        <!-- Header -->
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Welcome Back 👋</h2>
            <p class="text-muted">Login to your account</p>
        </div>

        <!-- Form -->
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <button class="btn btn-primary w-100 rounded-3 shadow-sm py-2">
                Login
            </button>

        </form>

        <!-- Links -->
        <div class="text-center mt-3">

            <a href="{% url 'password_reset' %}" class="text-decoration-none small text-primary">
                Forgot Password?
            </a>

        </div>

    </div>

</div>

{% endblock %}
